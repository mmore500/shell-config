include current-theme.conf
cursor_shape block

# Font (matching GNOME Terminal profile)
font_family      BlexMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Bold text uses bright colors (matching bold-is-bright=true)
draw_minimal_borders yes

# Match GNOME Terminal scrollback default (512 lines)
scrollback_lines 512

# Launch tmux on startup (matching custom-command=tmux)
shell tmux

# Find/search keybindings (matching GNOME Terminal custom keybindings)
map shift+alt+f show_scrollback
map shift+alt+g scroll_to_mark next
map shift+alt+h scroll_to_mark prev

# Pass ctrl+shift+f/s through to apps (Kitty defaults bind these to move_window_forward
# and paste_from_selection, which swallow the keys before Neovim can see them)
map ctrl+shift+f no_op
map ctrl+shift+s no_op

# Ctrl+Shift+X: kitty sends the same raw byte as Ctrl+X (shift info lost at the
# kitty→tmux boundary), so send the CSI-u extended key sequence explicitly.
map ctrl+shift+x send_text all \x1b[88;6u

# Send kitty keyboard protocol sequence for shift+enter so tmux/nvim see <S-CR>
map shift+enter send_text all \x1b[13;2u

# Use kitty terminfo for extended keyboard protocol support
term xterm-kitty
